name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署，避免并发覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 01_前端应用/package-lock.json

      - name: Setup Python (for corpus index build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        working-directory: 01_前端应用
        run: npm ci

      - name: Build (with GitHub Pages base path)
        working-directory: 01_前端应用
        env:
          VITE_BASE: /Spill-My-Bunny-Thoughts/
          # 从仓库 Secret 注入预置 DeepSeek key；未配置时为空，前端走本地规则模式
          VITE_PRESET_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run build

      - name: Add .nojekyll (bypass Jekyll so /corpus/*.json loads)
        working-directory: 01_前端应用
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 01_前端应用/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
